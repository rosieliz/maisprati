<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carrinho de Compras</title>
</head>
<body>
    <h1>Carrinho de Compras</h1>

    <button onclick="adicionarItem('Camiseta', 49.90); atualizarTela()">Adicionar Camiseta (R$ 49,90)</button>
    <button onclick="adicionarItem('Calça', 89.90); atualizarTela()">Adicionar Calça (R$ 89,90)</button>
    <button onclick="limparCarrinho(); atualizarTela()">Limpar o Carrinho</button>

    <p>
    Itens no carrinho: <span id="qtd">0</span>
    </p>
    <p>
    Total: R$ <span id="total">0.00</span>
    </p>

    <script src="./carrinho.js"></script>
    <script>
        function atualizarTela() {
            document.querySelector("#qtd").textContent = contarItens();
            document.querySelector("#total").textContent = calcularTotal().toFixed(2);
        }
    </script>
</body>
</html>
