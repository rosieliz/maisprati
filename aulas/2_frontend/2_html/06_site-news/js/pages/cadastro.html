<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Clarim Diário</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/components/form.css">
    <script src="../components/site-header.js"></script>
    <script src="../components/site-footer.js"></script>
    <script type="module" src="../../js/pages/cadastro.js"></script>
</head>
<body>
    <site-header></site-header>

    <main class="auth">
        <form id="form-cadastro" class="formulario">
            <h1>Criar conta</h1>
            <label>
                Nome Completo
                <input id="nome" type="text" required>
            </label>
            <label>
                E-mail
                <input id="email" type="email" required>
            </label>
            <label>
                Senha
                <input id="senha" type="password" required>
            </label>
            <label>
                CEP
                <input id="cep" type="text" placeholder="00000000" required>
            </label>

            <div class="linha">
                <div class="campo-largo">
                    <label>
                        Rua
                        <input id="logradouro" type="text">
                    </label>
                </div>
                <div class="campo-curto">
                    <label>
                        Número
                        <input id="numero" type="text">
                    </label>
                </div>
            </div>

            <label>
                Bairro
                <input id="bairro" type="text">
            </label>

            <div class="linha">
                <div class="campo-largo">
                    <label>
                        Cidade
                        <input id="cidade" type="text">
                    </label>
                </div>
                <div class="campo-curto">
                    <label>
                        UF
                        <input id="uf" type="text" maxlength="2">
                    </label>
                </div>
            </div>

            <p id="aviso" class="aviso"></p>
            <button type="submit" class="btn btn--primary">Cadastrar</button>
            <p class="rodape-form">
            Já tem conta?
                <a href="login.html">Entrar</a>
            </p>
        </form>
    </main>

    <site-footer></site-footer>
</body>
</html>
